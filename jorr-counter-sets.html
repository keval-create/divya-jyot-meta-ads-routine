<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#15100B" />
<title>Jorr Counter — Sets | DesiJorrKhana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Mukta:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --mitti:#15100B; --mitti-2:#1F1812; --mitti-3:#2A2018;
    --brass:#D4A02C; --brass-soft:#E8C46A; --sindoor:#C8401B;
    --bone:#EDE6D6; --bone-dim:#9C9078; --line:#3A2E22;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--mitti);color:var(--bone);font-family:'Mukta',sans-serif;overflow-x:hidden}
  .app{min-height:100dvh;display:flex;flex-direction:column}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--safe-t)) 16px 10px;gap:10px}
  .topbar .name{display:flex;align-items:baseline;gap:8px}
  .topbar h1{font-family:'Teko',sans-serif;font-weight:600;font-size:26px;letter-spacing:.5px;line-height:1}
  .topbar .deva{font-family:'Mukta',sans-serif;font-weight:700;font-size:16px;color:var(--brass)}

  .stage{position:relative;flex:1;min-height:0;margin:0 12px;border-radius:18px;overflow:hidden;background:#0c0905;border:1px solid var(--line)}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .mirror video,.mirror canvas{transform:scaleX(-1)}
  canvas{z-index:2}

  .count-overlay{position:absolute;z-index:3;top:10px;left:0;right:0;text-align:center;pointer-events:none;text-shadow:0 4px 24px rgba(0,0,0,.75)}
  .count-overlay .label{font-family:'Teko',sans-serif;letter-spacing:6px;text-transform:uppercase;font-size:15px;color:var(--brass-soft);font-weight:500}
  .count-overlay .num{font-family:'Teko',sans-serif;font-weight:700;font-size:120px;line-height:.82;color:var(--bone);transition:transform .08s ease,color .12s ease}
  .count-overlay .num.pulse{transform:scale(1.16);color:var(--sindoor)}
  .count-overlay .timer{font-family:'Teko',sans-serif;font-weight:500;font-size:34px;letter-spacing:3px;color:var(--brass-soft);margin-top:-4px}

  .setchip{position:absolute;z-index:3;top:14px;left:14px;font-family:'Teko',sans-serif;letter-spacing:2px;text-transform:uppercase;font-size:18px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:rgba(0,0,0,.45);color:var(--brass)}
  .breakchip{position:absolute;z-index:3;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(12,9,5,.72);text-align:center}
  .breakchip.show{display:flex}
  .breakchip .b1{font-family:'Teko',sans-serif;letter-spacing:8px;text-transform:uppercase;font-size:30px;color:var(--sindoor);text-shadow:0 2px 16px #000}
  .breakchip .b2{font-family:'Teko',sans-serif;font-size:110px;line-height:1;color:var(--bone);text-shadow:0 2px 16px #000}
  .breakchip .b3{font-family:'Mukta',sans-serif;color:var(--bone-dim);font-size:15px;margin-top:6px}

  .who{position:absolute;z-index:3;bottom:12px;left:14px;font-family:'Teko',sans-serif;font-size:22px;letter-spacing:.5px;color:var(--brass);text-shadow:0 2px 10px #000;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .watermark{position:absolute;z-index:3;bottom:14px;right:14px;font-family:'Mukta',sans-serif;font-weight:700;font-size:13px;color:rgba(237,230,214,.8);text-shadow:0 2px 8px #000;letter-spacing:.3px}

  .flip{position:absolute;z-index:4;top:12px;right:12px;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--bone)}
  .flip svg{width:22px;height:22px}

  .veil{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(12,9,5,.9);text-align:center;padding:26px;gap:12px}
  .veil h2{font-family:'Teko',sans-serif;font-weight:600;font-size:30px;letter-spacing:.5px}
  .veil p{color:var(--bone-dim);font-size:14.5px;line-height:1.55;max-width:340px}
  .veil .countdown{font-family:'Teko',sans-serif;font-size:120px;line-height:1;color:var(--brass)}
  .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--brass);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .dock{padding:12px 12px calc(12px + var(--safe-b));display:flex;flex-direction:column;gap:10px}
  input[type=text]{width:100%;background:var(--mitti-2);border:1px solid var(--line);color:var(--bone);font-family:'Mukta',sans-serif;font-size:16px;padding:14px;border-radius:12px}
  input[type=text]::placeholder{color:var(--bone-dim)}
  input[type=text]:focus{outline:none;border-color:var(--brass)}

  .btn-row{display:flex;gap:10px}
  button{font-family:'Teko',sans-serif;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-size:20px;padding:16px;border-radius:12px;border:1px solid transparent;background:var(--mitti-3);color:var(--bone);flex:1;cursor:pointer;transition:.15s}
  button:active{transform:scale(.98)}
  button.primary{background:var(--brass);color:#1a1206;flex:2}
  button.ghost{border-color:var(--line)}
  button.pause.on{border-color:var(--sindoor);color:#fff;background:var(--sindoor)}
  button:disabled{opacity:.4}
  button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

  button.share{background:var(--sindoor);color:#fff;width:100%;display:none;align-items:center;justify-content:center;gap:8px;flex:none}
  button.share.show{display:flex}
  button.share svg{width:20px;height:20px}

  .sens{display:flex;align-items:center;gap:10px;padding:2px 4px}
  .sens label{font-family:'Teko',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-size:14px;color:var(--bone-dim);white-space:nowrap}
  input[type=range]{accent-color:var(--brass);flex:1;height:30px}
  .sensVal{font-size:12px;color:var(--bone-dim);text-align:right}

  #cardCanvas{position:fixed;left:-99999px;top:0}
  .toast{position:fixed;left:50%;bottom:calc(20px + var(--safe-b));transform:translateX(-50%);background:var(--mitti-3);border:1px solid var(--line);color:var(--bone);padding:12px 18px;border-radius:10px;font-size:14px;z-index:20;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="name"><h1>JORR COUNTER</h1><span class="deva">DesiJorrKhana</span></div>
  </div>

  <div class="stage mirror" id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>

    <button class="flip" id="flipBtn" aria-label="Flip camera" title="Flip camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>

    <div class="setchip" id="setchip">SET 1</div>
    <div class="count-overlay"><div class="label">Swings</div><div class="num" id="count">0</div><div class="timer" id="timer">0:00</div></div>
    <div class="breakchip" id="breakchip"><div class="b1">Break</div><div class="b2" id="breakTime">0:00</div><div class="b3">Tap Resume to start the next set</div></div>
    <div class="who" id="who"></div>
    <div class="watermark">@desijorrkhana</div>

    <div class="veil" id="veil">
      <div class="spinner" id="spinner"></div>
      <h2 id="veilTitle">Loading…</h2>
      <p id="veilMsg">Setting up. Allow camera access when asked.</p>
    </div>
  </div>

  <div class="dock">
    <input type="text" id="name" placeholder="Your name (e.g. गुड्डू)" autocomplete="off" />
    <div class="sens">
      <label for="sens">Sensitivity</label>
      <input type="range" id="sens" min="1" max="10" value="6" />
      <span class="sensVal" id="sensVal">Medium</span>
    </div>
    <button class="ghost" id="modeBtn" style="flex:none">Mode: Auto-detect</button>
    <div class="btn-row">
      <button class="primary" id="startBtn" disabled>Start</button>
      <button class="ghost pause" id="pauseBtn" disabled>Pause</button>
    </div>
    <div class="btn-row">
      <button class="ghost" id="finishBtn" disabled>Finish</button>
      <button class="ghost" id="resetBtn">Reset</button>
    </div>
    <button class="share" id="shareBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Share my workout
    </button>
  </div>
</div>

<canvas id="cardCanvas" width="1080" height="1920"></canvas>
<div class="toast" id="toast"></div>

<script type="module">
import { PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

const $=id=>document.getElementById(id);
const video=$('video'),canvas=$('canvas'),ctx=canvas.getContext('2d');
const stage=$('stage'),countEl=$('count'),whoEl=$('who'),veil=$('veil'),veilTitle=$('veilTitle'),veilMsg=$('veilMsg'),spinner=$('spinner');
const timerEl=$('timer'),setChip=$('setchip'),breakchip=$('breakchip'),breakTimeEl=$('breakTime');
const startBtn=$('startBtn'),pauseBtn=$('pauseBtn'),finishBtn=$('finishBtn'),resetBtn=$('resetBtn'),flipBtn=$('flipBtn'),shareBtn=$('shareBtn');
const nameInp=$('name'),sens=$('sens'),sensVal=$('sensVal'),toast=$('toast');

let landmarker=null,running=false,counting=false,rafId=null,lastT=-1,facing='user',lastLandmarks=null;
let count=0,state='down';
let mode='auto',stateL='down',stateR='down',pendingUp=null;const SYNC_MS=260;
let phase='idle';            // idle | active | paused | done
let sets=0,swingMs=0,breakMs=0,segStart=0,pauseStart=0,timerInt=null;
let lastScore=0,lastName='',lastSets=0,lastSwing='0:00',lastBreak='0:00',lastTotal='0:00',lastFinish='';


function sensLabel(){const v=+sens.value;return v<=3?'Strict':v<=7?'Medium':'Easy'}
sens.addEventListener('input',()=>sensVal.textContent=sensLabel());
const modeBtn=document.getElementById('modeBtn');
modeBtn.addEventListener('click',()=>{mode=mode==='auto'?'single':mode==='single'?'double':'auto';state='down';resetTracks();modeBtn.textContent='Mode: '+(mode==='auto'?'Auto-detect':mode==='single'?'1 Mace':'2 Clubs');modeBtn.classList.toggle('on',mode!=='auto')});
function fmtDur(ms){const s=Math.round(ms/1000),m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0')}
function nowClock(){return new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('show'),3400)}

async function init(){
  try{
    const fs=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm");
    const model="https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task";
    try{landmarker=await PoseLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:model,delegate:"GPU"},runningMode:"VIDEO",numPoses:1});}
    catch(e){landmarker=await PoseLandmarker.createFromOptions(fs,{baseOptions:{modelAssetPath:model,delegate:"CPU"},runningMode:"VIDEO",numPoses:1});}
    spinner.style.display='none';veilTitle.textContent='Ready to swing';veilMsg.textContent='Type a name, then tap Start.';startBtn.disabled=false;
  }catch(e){spinner.style.display='none';veilTitle.textContent="Couldn't load";veilMsg.innerHTML="Connect to the internet and reload. Camera only works from a web link (https), not a saved file.";console.error(e);}
}
init();

async function startCamera(){
  if(video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop())}
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:960}},audio:false});
  video.srcObject=stream;await video.play();
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  stage.classList.toggle('mirror',facing==='user');
}
flipBtn.addEventListener('click',async()=>{facing=facing==='user'?'environment':'user';if(running){try{await startCamera()}catch(e){facing=facing==='user'?'environment':'user'}}});

function countdown(){return new Promise(res=>{let n=3;veil.style.display='flex';spinner.style.display='none';veilTitle.style.display='none';veilMsg.style.display='none';const cd=document.createElement('div');cd.className='countdown';veil.appendChild(cd);cd.textContent=n;const t=setInterval(()=>{n--;if(n<=0){clearInterval(t);cd.remove();veil.style.display='none';veilTitle.style.display='';veilMsg.style.display='';res()}else cd.textContent=n},1000)})}

const C={NOSE:0,L_SH:11,R_SH:12,L_WR:15,R_WR:16};
const avg=(a,b)=>(a+b)/2;
function loop(){if(!running)return;if(video.currentTime!==lastT){lastT=video.currentTime;const r=landmarker.detectForVideo(video,performance.now());lastLandmarks=(r.landmarks&&r.landmarks.length)?r.landmarks[0]:null;draw(r);if(counting&&phase==='active'&&lastLandmarks)detect(lastLandmarks)}rafId=requestAnimationFrame(loop)}
const DECAY=0.0024,REFRAC_MS=380;
function sensConfig(){const v=+sens.value;return {minr:0.12-(v-1)*0.007,bandf:0.30-(v-1)*0.0156}}
function mkTrack(){return {min:1,max:0,sy:0,state:'down',init:false,tlast:-99999}}
let trkL=mkTrack(),trkR=mkTrack(),trkC=mkTrack();
function resetTracks(){trkL=mkTrack();trkR=mkTrack();trkC=mkTrack();pendingUp=null}
function stepTrack(t,y,now){
  if(!t.init){t.min=y;t.max=y;t.sy=y;t.init=true;return false}
  t.sy=t.sy*0.5+y*0.5;const yy=t.sy;
  if(yy<t.min)t.min=yy;else t.min=Math.min(t.min+DECAY,1);
  if(yy>t.max)t.max=yy;else t.max=Math.max(t.max-DECAY,0);
  const range=t.max-t.min;const{minr,bandf}=sensConfig();
  if(range<minr)return false;
  const mid=(t.min+t.max)/2,band=range*bandf;
  if(t.state==='down'&&yy<mid-band){t.state='up';if(now-t.tlast>=REFRAC_MS){t.tlast=now;return true}return false}
  if(t.state==='up'&&yy>mid+band){t.state='down'}
  return false;
}
function detect(lm){
  const now=performance.now();
  const lVis=lm[C.L_WR].visibility??1,rVis=lm[C.R_WR].visibility??1;
  if(mode==='single'){if(Math.min(lVis,rVis)<0.4)return;const y=Math.min(lm[C.L_WR].y,lm[C.R_WR].y);if(stepTrack(trkC,y,now)){count++;render(true)}return}
  let upL=false,upR=false;
  if(lVis>=0.4)upL=stepTrack(trkL,lm[C.L_WR].y,now);
  if(rVis>=0.4)upR=stepTrack(trkR,lm[C.R_WR].y,now);
  if(mode==='double'){const n=(upL?1:0)+(upR?1:0);if(n){count+=n;render(true)}return}
  if(!upL&&!upR)return;
  if(upL&&upR){count++;render(true);pendingUp=now;return}
  if(pendingUp&&now-pendingUp<SYNC_MS){pendingUp=null}else{count++;render(true);pendingUp=now}
}
function render(p){countEl.textContent=count;if(p){countEl.classList.add('pulse');setTimeout(()=>countEl.classList.remove('pulse'),120)}}

const BONES=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
function draw(r){ctx.clearRect(0,0,canvas.width,canvas.height);if(!r.landmarks||!r.landmarks.length)return;const lm=r.landmarks[0],W=canvas.width,H=canvas.height;ctx.lineWidth=Math.max(3,W*0.006);ctx.strokeStyle='rgba(212,160,44,.85)';for(const[a,b]of BONES){if((lm[a].visibility??1)<0.4||(lm[b].visibility??1)<0.4)continue;ctx.beginPath();ctx.moveTo(lm[a].x*W,lm[a].y*H);ctx.lineTo(lm[b].x*W,lm[b].y*H);ctx.stroke()}for(const i of[15,16]){if((lm[i].visibility??1)<0.4)continue;ctx.beginPath();ctx.arc(lm[i].x*W,lm[i].y*H,Math.max(7,W*0.014),0,7);ctx.fillStyle=state==='up'?'#C8401B':'#E8C46A';ctx.fill()}}

/* ---------- workout (auto-count + sets + pause + breaks) ---------- */
function updateTimers(){
  if(phase==='active'){timerEl.textContent=fmtDur(swingMs+(Date.now()-segStart))}
  else if(phase==='paused'){breakTimeEl.textContent=fmtDur(breakMs+(Date.now()-pauseStart))}
}
function startWorkout(){
  phase='active';sets=1;swingMs=0;breakMs=0;segStart=Date.now();count=0;state='down';resetTracks();render(false);
  setChip.textContent='SET 1';breakchip.classList.remove('show');timerEl.textContent='0:00';
  counting=true;
  pauseBtn.disabled=false;finishBtn.disabled=false;pauseBtn.textContent='Pause';pauseBtn.classList.remove('on');
  if(timerInt)clearInterval(timerInt);timerInt=setInterval(updateTimers,200);
}
function pauseWorkout(){
  if(phase!=='active')return;
  swingMs+=Date.now()-segStart;pauseStart=Date.now();phase='paused';counting=false;
  pauseBtn.textContent='Resume';pauseBtn.classList.add('on');
  breakchip.classList.add('show');breakTimeEl.textContent='0:00';
  setChip.textContent='PAUSED · SET '+sets;
}
function resumeWorkout(){
  if(phase!=='paused')return;
  breakMs+=Date.now()-pauseStart;segStart=Date.now();phase='active';counting=true;sets++;
  pauseBtn.textContent='Pause';pauseBtn.classList.remove('on');
  breakchip.classList.remove('show');setChip.textContent='SET '+sets;
}
function finishWorkout(){
  if(phase==='active'){swingMs+=Date.now()-segStart}
  else if(phase==='paused'){breakMs+=Date.now()-pauseStart}
  else return;
  phase='done';running=false;counting=false;
  if(rafId)cancelAnimationFrame(rafId);
  if(timerInt){clearInterval(timerInt);timerInt=null}
  if(video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null}
  ctx.clearRect(0,0,canvas.width,canvas.height);breakchip.classList.remove('show');
  lastScore=count;lastName=nameInp.value.trim();lastSets=sets;
  lastSwing=fmtDur(swingMs);lastBreak=fmtDur(breakMs);lastTotal=fmtDur(swingMs+breakMs);lastFinish=nowClock();
  startBtn.disabled=false;pauseBtn.disabled=true;finishBtn.disabled=true;
  shareBtn.classList.add('show');
  setTimeout(()=>shareBtn.scrollIntoView({behavior:'smooth',block:'center'}),200);
}

startBtn.addEventListener('click',async()=>{
  startBtn.disabled=true;shareBtn.classList.remove('show');
  try{await startCamera()}
  catch(e){veil.style.display='flex';veilTitle.style.display='';veilMsg.style.display='';veilTitle.textContent='Camera blocked';veilMsg.innerHTML='Allow camera access, then tap Start again. Must be opened from a web link, not a saved file.';startBtn.disabled=false;return}
  whoEl.textContent=nameInp.value.trim();
  running=true;phase='idle';counting=false;loop();await countdown();
  startWorkout();
});
pauseBtn.addEventListener('click',()=>{if(phase==='active')pauseWorkout();else if(phase==='paused')resumeWorkout()});
finishBtn.addEventListener('click',finishWorkout);
resetBtn.addEventListener('click',()=>{
  count=0;state='down';resetTracks();render(false);phase='idle';sets=0;swingMs=0;breakMs=0;
  if(timerInt){clearInterval(timerInt);timerInt=null}
  timerEl.textContent='0:00';setChip.textContent='SET 1';breakchip.classList.remove('show');
  shareBtn.classList.remove('show');pauseBtn.disabled=true;finishBtn.disabled=true;
});

/* ---------- branded workout card ---------- */
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}
function buildCard(){
  const cc=$('cardCanvas'),x=cc.getContext('2d'),W=1080,H=1920;
  const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#241a12');g.addColorStop(.5,'#15100B');g.addColorStop(1,'#0c0905');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  x.strokeStyle='#3A2E22';x.lineWidth=4;roundRect(x,40,40,W-80,H-80,40);x.stroke();
  x.textAlign='center';
  if(window._logoImg){const s=240;x.drawImage(window._logoImg,(W-s)/2,90,s,s);}
  x.fillStyle='#EDE6D6';x.font='600 78px Teko, sans-serif';x.fillText('JORR COUNTER',W/2,420);
  x.fillStyle='#D4A02C';x.font='700 52px Mukta, sans-serif';x.fillText('DesiJorrKhana',W/2,488);
  x.fillStyle='#E8C46A';x.font='500 44px Teko, sans-serif';x.fillText('S W I N G S',W/2,640);
  x.fillStyle='#EDE6D6';x.font='700 360px Teko, sans-serif';x.fillText(String(lastScore),W/2,960);
  if(lastName){x.fillStyle='#D4A02C';x.font='600 76px Teko, sans-serif';x.fillText(lastName,W/2,1090);}
  x.fillStyle='#E8C46A';x.font='500 52px Teko, sans-serif';
  x.fillText('SETS  '+lastSets+'      ·      SWING  '+lastSwing,W/2,1230);
  x.fillText('BREAKS  '+lastBreak+'      ·      TOTAL  '+lastTotal,W/2,1310);

async function shareScore(){
  const cc=buildCard();

  const file=new File([blob],'jorr-workout.png',{type:'image/png'});
  const text=`${lastScore} swings · ${lastSets} sets in ${lastTotal} 💪 DesiJorrKhana — try it: ${location.href}`;
  if(navigator.canShare && navigator.canShare({files:[file]})){try{await navigator.share({files:[file],text});return}catch(e){if(e.name==='AbortError')return}}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='jorr-workout.png';a.click();URL.revokeObjectURL(url);
  showToast('Card saved to your photos. Open Instagram \u2192 New Post \u2192 pick it.');
}
